name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_reason:
        description: 'Reason for manual deployment'
        required: false
        type: string

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: attendancems
  ECS_CLUSTER: attendancems-cluster
  ECS_SERVICE: attendancems-service
  CONTAINER_NAME: attendancems
  TF_WORKING_DIR: infra/terraform

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # ============================================
  # TEST JOB - Runs on all PRs and pushes
  # ============================================
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: attendancems_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d attendancems_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        working-directory: app/backend
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run linting
        working-directory: app/backend
        run: |
          pip install ruff
          ruff check app/ --ignore E501

      - name: Run tests
        working-directory: app/backend
        env:
          DATABASE_URL: postgresql+psycopg2://test:test@localhost:5432/attendancems_test
          JWT_SECRET_KEY: test-secret
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with:
          file: ./app/backend/coverage.xml
          fail_ci_if_error: false

  # ============================================
  # CHECK INFRASTRUCTURE - Fast check if infra exists
  # ============================================
  check-infrastructure:
    name: Check Infrastructure
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    outputs:
      infra_exists: ${{ steps.check.outputs.infra_exists }}
      needs_terraform: ${{ steps.check.outputs.needs_terraform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check if infrastructure exists
        id: check
        run: |
          # Check if ECS cluster and service exist (indicates infra is up)
          CLUSTER_EXISTS=$(aws ecs describe-clusters --clusters ${{ env.ECS_CLUSTER }} \
            --query 'clusters[0].status' --output text 2>/dev/null || echo "MISSING")
          
          SERVICE_EXISTS=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
          
          ECR_EXISTS=$(aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} \
            --query 'repositories[0].repositoryName' --output text 2>/dev/null || echo "MISSING")
          
          # Check if terraform files changed in this commit
          # For workflow_dispatch, always consider TF as changed to force a full deploy
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TF_CHANGED=1
          else
            TF_CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'infra/terraform/' 2>/dev/null | wc -l | tr -d ' ')
          fi
          
          echo "Cluster: $CLUSTER_EXISTS, Service: $SERVICE_EXISTS, ECR: $ECR_EXISTS, TF Changed: $TF_CHANGED"
          
          if [ "$CLUSTER_EXISTS" == "ACTIVE" ] && [ "$SERVICE_EXISTS" == "ACTIVE" ] && [ "$ECR_EXISTS" == "${{ env.ECR_REPOSITORY }}" ]; then
            echo "Infrastructure exists!"
            echo "infra_exists=true" >> $GITHUB_OUTPUT
            
            # Only run terraform if terraform files changed
            if [ "$TF_CHANGED" -gt "0" ]; then
              echo "📝 Terraform files changed, will run terraform apply"
              echo "needs_terraform=true" >> $GITHUB_OUTPUT
            else
              echo "No terraform changes, skipping terraform apply"
              echo "needs_terraform=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Infrastructure missing, need full terraform apply"
            echo "infra_exists=false" >> $GITHUB_OUTPUT
            echo "needs_terraform=true" >> $GITHUB_OUTPUT
          fi

  # ============================================
  # TERRAFORM PLAN - Runs on PRs
  # ============================================
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          tflint --init
          tflint --recursive
        continue-on-error: true

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        id: plan
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          echo "plan_output<<EOF" >> $GITHUB_OUTPUT
          cat plan_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Comment PR with Plan
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const output = `#### Terraform Plan 📖
            
            <details><summary>Show Plan</summary>
            
            \`\`\`terraform
            ${{ steps.plan.outputs.plan_output }}
            \`\`\`
            
            </details>
            
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  # ============================================
  # TERRAFORM APPLY - Only runs if infrastructure missing OR terraform files changed
  # ============================================
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [test, check-infrastructure]
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && 
      github.ref == 'refs/heads/main' && 
      needs.check-infrastructure.outputs.needs_terraform == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Force unlock Terraform state if locked
        run: |
          aws dynamodb delete-item --table-name attendancems-terraform-locks \
            --key '{"LockID":{"S":"attendancems-terraform-state-641250539814/prod/terraform.tfstate"}}' 2>/dev/null || true
          echo "✅ Cleared any stale state locks"

      - name: Clean up orphaned RDS resources
        run: |
          # DB subnet groups can persist after destroy if state was cleaned
          aws rds delete-db-subnet-group \
            --db-subnet-group-name attendancems-db-subnet-group 2>/dev/null \
            && echo "✅ Cleaned up orphaned DB subnet group" \
            || echo "ℹ️ No orphaned DB subnet group found"

      - name: Check for RDS snapshot to restore from
        id: check-snapshot
        run: |
          # Only restore from snapshot if the RDS instance does NOT already exist.
          # Passing snapshot_identifier to an existing instance would force Terraform
          # to destroy and recreate it (~10-15 min), which is the main cause of slow deploys.
          RDS_STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier attendancems-db \
            --query 'DBInstances[0].DBInstanceStatus' \
            --output text 2>/dev/null || echo "MISSING")

          if [ "$RDS_STATUS" != "MISSING" ] && [ "$RDS_STATUS" != "None" ]; then
            echo "✅ RDS instance already exists (status: $RDS_STATUS), skipping snapshot restore"
            echo "has_snapshot=false" >> $GITHUB_OUTPUT
          else
            SNAPSHOT_ID=$(aws ssm get-parameter \
              --name "/attendancems/latest-db-snapshot" \
              --query 'Parameter.Value' \
              --output text 2>/dev/null || echo "")
            
            if [ -n "$SNAPSHOT_ID" ] && [ "$SNAPSHOT_ID" != "None" ]; then
              if aws rds describe-db-snapshots --db-snapshot-identifier "$SNAPSHOT_ID" &>/dev/null; then
                echo "📸 RDS missing, restoring from snapshot: $SNAPSHOT_ID"
                echo "snapshot_id=$SNAPSHOT_ID" >> $GITHUB_OUTPUT
                echo "has_snapshot=true" >> $GITHUB_OUTPUT
              else
                echo "⚠️ Snapshot $SNAPSHOT_ID not found, creating fresh database"
                echo "has_snapshot=false" >> $GITHUB_OUTPUT
              fi
            else
              echo "ℹ️ No snapshot configured, creating fresh database"
              echo "has_snapshot=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          if [ "${{ steps.check-snapshot.outputs.has_snapshot }}" == "true" ]; then
            echo "🔄 Restoring database from snapshot"
            terraform apply -auto-approve -lock-timeout=5m -parallelism=20 \
              -var="db_snapshot_identifier=${{ steps.check-snapshot.outputs.snapshot_id }}"
          else
            terraform apply -auto-approve -lock-timeout=5m -parallelism=20
          fi

  # ============================================
  # BUILD JOB - Runs in parallel if infra exists, otherwise waits for terraform
  # ============================================
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: [test, check-infrastructure, terraform-apply]
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && 
      github.ref == 'refs/heads/main' &&
      needs.test.result == 'success' &&
      needs.check-infrastructure.result == 'success' &&
      (needs.terraform-apply.result == 'success' || needs.terraform-apply.result == 'skipped')
    outputs:
      image: ${{ steps.build-image.outputs.image }}
      image_tag: ${{ steps.build-image.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build with cache
          docker buildx build \
            --cache-from type=registry,ref=$ECR_REGISTRY/$ECR_REPOSITORY:buildcache \
            --cache-to type=registry,ref=$ECR_REGISTRY/$ECR_REPOSITORY:buildcache,mode=max \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push \
            .
          
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

  # ============================================
  # DEPLOY JOB - Deploys to ECS
  # ============================================
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && 
      github.ref == 'refs/heads/main' &&
      needs.build.result == 'success'
    environment:
      name: production
      url: https://tm.zainecs.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_SERVICE }} \
            --query taskDefinition > task-definition.json
          
          # Remove fields that can't be used in RegisterTaskDefinition
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            task-definition.json > clean-task-definition.json
          mv clean-task-definition.json task-definition.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build.outputs.image }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ============================================
  # POST-DEPLOY CHECKS - Validates deployment
  # ============================================
  post-deploy-checks:
    name: Post-Deploy Checks
    runs-on: ubuntu-latest
    needs: deploy
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && 
      github.ref == 'refs/heads/main' &&
      needs.deploy.result == 'success'

    steps:
      - name: Wait for deployment to propagate
        run: sleep 60

      - name: Health check - API
        run: |
          for i in {1..5}; do
            response=$(curl -sf -o /dev/null -w "%{http_code}" https://tm.zainecs.com/health || echo "000")
            if [ "$response" = "200" ]; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i: Health check returned $response, retrying in 15s..."
            sleep 15
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

      - name: Health check - Frontend
        run: |
          response=$(curl -sf -o /dev/null -w "%{http_code}" https://tm.zainecs.com/ || echo "000")
          if [ "$response" != "200" ]; then
            echo "❌ Frontend check failed with status: $response"
            exit 1
          fi
          echo "✅ Frontend check passed!"

      - name: API smoke test - Login endpoint
        run: |
          response=$(curl -sf -X POST https://tm.zainecs.com/api/auth/login \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "username=admin&password=admin" \
            -w "\n%{http_code}" || echo -e "\n000")
          
          status_code=$(echo "$response" | tail -n 1)
          if [ "$status_code" = "200" ]; then
            echo "✅ Login API smoke test passed!"
          else
            echo "❌ Login API smoke test failed with status: $status_code"
            exit 1
          fi

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Health API | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Login API | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** \`${{ needs.build.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://tm.zainecs.com" >> $GITHUB_STEP_SUMMARY
