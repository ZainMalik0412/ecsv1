name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm infrastructure destruction'
        required: true
        type: string

env:
  AWS_REGION: eu-west-2
  TF_WORKING_DIR: infra/terraform

permissions:
  id-token: write
  contents: read

jobs:
  validate-confirmation:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation input
        if: ${{ github.event.inputs.confirm != 'destroy' }}
        run: |
          echo "❌ Confirmation failed. You must type 'destroy' to confirm."
          echo "   You entered: '${{ github.event.inputs.confirm }}'"
          exit 1

      - name: Confirmation accepted
        run: |
          echo "⚠️  Destruction confirmed. Proceeding with infrastructure teardown..."

  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: validate-confirmation
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Delete existing RDS final snapshot if exists
        run: |
          # Delete existing final snapshot to prevent 'DBSnapshotAlreadyExists' error
          SNAPSHOT_ID="attendancems-db-final-snapshot"
          echo "Checking for existing snapshot: $SNAPSHOT_ID"
          if aws rds describe-db-snapshots --db-snapshot-identifier "$SNAPSHOT_ID" 2>/dev/null; then
            echo "Found existing snapshot, deleting..."
            aws rds delete-db-snapshot --db-snapshot-identifier "$SNAPSHOT_ID"
            echo "Waiting for snapshot deletion..."
            aws rds wait db-snapshot-deleted --db-snapshot-identifier "$SNAPSHOT_ID" || true
            echo "✅ Snapshot deleted"
          else
            echo "No existing snapshot found, proceeding..."
          fi

      - name: Terraform Plan Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -destroy -out=tfplan

      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Clean up Terraform state for fresh rebuild
        if: success()
        run: |
          # Delete the state file so next apply starts fresh
          aws s3 rm s3://attendancems-terraform-state/prod/terraform.tfstate || true
          # Clean up any stale DynamoDB entries
          aws dynamodb delete-item --table-name attendancems-terraform-locks \
            --key '{"LockID":{"S":"attendancems-terraform-state/prod/terraform.tfstate"}}' || true
          aws dynamodb delete-item --table-name attendancems-terraform-locks \
            --key '{"LockID":{"S":"attendancems-terraform-state/prod/terraform.tfstate-md5"}}' || true
          echo "✅ Terraform state cleaned up for fresh rebuild"

      - name: Destruction summary
        if: always()
        run: |
          echo "## 🗑️ Infrastructure Destruction" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ env.AWS_REGION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ All AWS infrastructure has been destroyed." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Destruction may have partially failed. Check logs above." >> $GITHUB_STEP_SUMMARY
          fi
