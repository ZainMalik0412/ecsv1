name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm infrastructure destruction'
        required: true
        type: string

env:
  AWS_REGION: eu-west-2
  TF_WORKING_DIR: infra/terraform

permissions:
  id-token: write
  contents: read

jobs:
  validate-confirmation:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation input
        if: ${{ github.event.inputs.confirm != 'destroy' }}
        run: |
          echo "❌ Confirmation failed. You must type 'destroy' to confirm."
          echo "   You entered: '${{ github.event.inputs.confirm }}'"
          exit 1

      - name: Confirmation accepted
        run: |
          echo "⚠️  Destruction confirmed. Proceeding with infrastructure teardown..."

  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: validate-confirmation
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Force unlock Terraform state if locked
        run: |
          # Clean up any stale locks from previous failed runs BEFORE terraform init
          aws dynamodb delete-item --table-name attendancems-terraform-locks \
            --key '{"LockID":{"S":"attendancems-terraform-state/prod/terraform.tfstate"}}' 2>/dev/null || true
          echo "✅ Cleared any stale state locks"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Save RDS snapshot before deletion
        id: snapshot
        run: |
          echo "📸 Saving RDS snapshot before deletion..."
          
          # Check if RDS instance exists
          RDS_EXISTS=$(aws rds describe-db-instances \
            --db-instance-identifier attendancems-db \
            --query 'DBInstances[0].DBInstanceIdentifier' \
            --output text 2>/dev/null || echo "")
          
          if [ -n "$RDS_EXISTS" ] && [ "$RDS_EXISTS" != "None" ]; then
            # Create a new snapshot with timestamp
            SNAPSHOT_ID="attendancems-final-$(date +%Y%m%d-%H%M%S)"
            echo "  Creating snapshot: $SNAPSHOT_ID"
            aws rds create-db-snapshot \
              --db-instance-identifier attendancems-db \
              --db-snapshot-identifier "$SNAPSHOT_ID"
            
            # Wait for the snapshot to finish (critical - must complete before RDS is deleted)
            echo "  Waiting for snapshot to become available (this may take a few minutes)..."
            aws rds wait db-snapshot-available \
              --db-snapshot-identifier "$SNAPSHOT_ID"
            echo "✅ Snapshot $SNAPSHOT_ID is available"
            
            # Save snapshot ID to SSM
            aws ssm put-parameter \
              --name "/attendancems/latest-db-snapshot" \
              --value "$SNAPSHOT_ID" \
              --type String \
              --overwrite
            echo "✅ Snapshot $SNAPSHOT_ID saved to SSM"
            echo "snapshot_id=$SNAPSHOT_ID" >> $GITHUB_OUTPUT
          else
            echo "  No RDS instance found, checking for existing snapshots..."
            LATEST=$(aws rds describe-db-snapshots \
              --query "DBSnapshots[?contains(DBSnapshotIdentifier, 'attendancems')] | sort_by(@, &SnapshotCreateTime) | [-1].DBSnapshotIdentifier" \
              --output text 2>/dev/null || echo "")
            if [ -n "$LATEST" ] && [ "$LATEST" != "None" ]; then
              aws ssm put-parameter \
                --name "/attendancems/latest-db-snapshot" \
                --value "$LATEST" \
                --type String \
                --overwrite 2>/dev/null || true
              echo "✅ Using existing snapshot: $LATEST"
              echo "snapshot_id=$LATEST" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Pre-destroy - Delete slow resources (speeds up terraform destroy)
        run: |
          echo "🚀 Pre-destroying NAT Gateways and EIPs to speed up VPC deletion..."
          
          # Find and delete NAT Gateways (these take 5+ minutes if left to terraform)
          NAT_GWS=$(aws ec2 describe-nat-gateways \
            --filter "Name=tag:Name,Values=*attendancems*" "Name=state,Values=available,pending" \
            --query 'NatGateways[*].NatGatewayId' --output text 2>/dev/null || echo "")
          
          for nat in $NAT_GWS; do
            echo "  Deleting NAT Gateway: $nat"
            aws ec2 delete-nat-gateway --nat-gateway-id "$nat" 2>/dev/null || true
          done
          
          # Wait briefly for NAT Gateways to start deleting
          if [ -n "$NAT_GWS" ]; then
            echo "  Waiting 30s for NAT Gateway deletion to start..."
            sleep 30
          fi
          
          # Find and release Elastic IPs
          EIPS=$(aws ec2 describe-addresses \
            --filters "Name=tag:Name,Values=*attendancems*" \
            --query 'Addresses[*].AllocationId' --output text 2>/dev/null || echo "")
          
          for eip in $EIPS; do
            echo "  Releasing Elastic IP: $eip"
            aws ec2 release-address --allocation-id "$eip" 2>/dev/null || true
          done
          
          # Delete ECS services to speed up cluster deletion
          aws ecs update-service --cluster attendancems-cluster --service attendancems-service \
            --desired-count 0 2>/dev/null || true
          aws ecs delete-service --cluster attendancems-cluster --service attendancems-service \
            --force 2>/dev/null || true
          
          # Delete ALB listeners and target groups
          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?contains(LoadBalancerName, 'attendancems')].LoadBalancerArn" \
            --output text 2>/dev/null || echo "")
          
          if [ -n "$ALB_ARN" ]; then
            # Delete listeners first
            LISTENERS=$(aws elbv2 describe-listeners --load-balancer-arn "$ALB_ARN" \
              --query 'Listeners[*].ListenerArn' --output text 2>/dev/null || echo "")
            for listener in $LISTENERS; do
              aws elbv2 delete-listener --listener-arn "$listener" 2>/dev/null || true
            done
            
            # Delete the ALB
            aws elbv2 delete-load-balancer --load-balancer-arn "$ALB_ARN" 2>/dev/null || true
          fi
          
          # Delete target groups
          TGS=$(aws elbv2 describe-target-groups \
            --query "TargetGroups[?contains(TargetGroupName, 'attendancems')].TargetGroupArn" \
            --output text 2>/dev/null || echo "")
          for tg in $TGS; do
            aws elbv2 delete-target-group --target-group-arn "$tg" 2>/dev/null || true
          done
          
          # Delete RDS instance with skip-final-snapshot (we already saved a snapshot earlier)
          echo "  Deleting RDS instance (skip-final-snapshot)..."
          aws rds delete-db-instance \
            --db-instance-identifier attendancems-db \
            --skip-final-snapshot \
            --delete-automated-backups \
            2>/dev/null || echo "  RDS instance may not exist or already deleted"
          
          echo "✅ Pre-destroy cleanup complete"

      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          # Use refresh=true so terraform sees pre-deleted resources are gone
          # Use aggressive parallelism for faster destroy
          terraform destroy -auto-approve \
            -lock-timeout=5m \
            -parallelism=50 \
            -refresh=true \
            || echo "⚠️ Terraform destroy completed with warnings"

      - name: Delete Route53 DNS records
        if: always()
        run: |
          echo "🗑️ Cleaning up Route53 DNS records..."
          
          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name zainecs.com \
            --query 'HostedZones[0].Id' \
            --output text 2>/dev/null | sed 's|/hostedzone/||' || echo "")
          
          if [ -n "$ZONE_ID" ] && [ "$ZONE_ID" != "None" ]; then
            # Delete A record for tm.zainecs.com
            aws route53 list-resource-record-sets \
              --hosted-zone-id "$ZONE_ID" \
              --query "ResourceRecordSets[?Name=='tm.zainecs.com.' && Type=='A']" \
              --output json 2>/dev/null | jq -c '.[]' | while read record; do
                aws route53 change-resource-record-sets \
                  --hosted-zone-id "$ZONE_ID" \
                  --change-batch '{"Changes":[{"Action":"DELETE","ResourceRecordSet":'"$record"'}]}' \
                  2>/dev/null || true
            done
            
            # Delete ACM validation CNAME records
            aws route53 list-resource-record-sets \
              --hosted-zone-id "$ZONE_ID" \
              --query "ResourceRecordSets[?Type=='CNAME' && contains(Name, '_acm-challenge')]" \
              --output json 2>/dev/null | jq -c '.[]' | while read record; do
                aws route53 change-resource-record-sets \
                  --hosted-zone-id "$ZONE_ID" \
                  --change-batch '{"Changes":[{"Action":"DELETE","ResourceRecordSet":'"$record"'}]}' \
                  2>/dev/null || true
            done
            echo "✅ Route53 records deleted"
          fi

      - name: Clean up remaining AWS resources
        if: always()
        run: |
          echo "�️ Cleaning up remaining resources..."
          
          # Delete ECR images
          aws ecr batch-delete-image \
            --repository-name attendancems \
            --image-ids "$(aws ecr list-images --repository-name attendancems --query 'imageIds[*]' --output json 2>/dev/null || echo '[]')" \
            2>/dev/null || true
          
          # Delete CloudWatch log groups
          aws logs delete-log-group --log-group-name /ecs/attendancems 2>/dev/null || true
          
          # Deregister all ECS task definition revisions (not removed by terraform destroy)
          echo "  Cleaning up ECS task definitions..."
          aws ecs list-task-definitions --family-prefix attendancems-service \
            --query 'taskDefinitionArns[]' --output text 2>/dev/null | tr '\t' '\n' | \
            while read td; do
              if [ -n "$td" ]; then
                aws ecs deregister-task-definition --task-definition "$td" >/dev/null 2>&1 || true
              fi
            done
          # Delete inactive task definitions in batches of 10 (API limit)
          # Use sed to extract short-form identifiers (family:revision) from full ARNs
          aws ecs list-task-definitions --family-prefix attendancems-service --status INACTIVE \
            --query 'taskDefinitionArns[]' --output text 2>/dev/null | tr '\t' '\n' | \
            sed 's|.*/||' | xargs -n 10 bash -c \
            'if [ $# -gt 0 ]; then aws ecs delete-task-definitions --task-definitions "$@" >/dev/null 2>&1 || true; fi' _
          
          # Delete orphaned ACM certificates for our domain
          echo "  Cleaning up ACM certificates..."
          aws acm list-certificates \
            --query "CertificateSummaryList[?contains(DomainName,'zainecs')].CertificateArn" \
            --output text 2>/dev/null | tr '\t' '\n' | while read arn; do
              if [ -n "$arn" ]; then
                aws acm delete-certificate --certificate-arn "$arn" 2>/dev/null || true
              fi
            done
          
          echo "✅ Resource cleanup complete"

      - name: Clean up RDS snapshots (keep latest only)
        if: always()
        run: |
          echo "🗑️ RDS snapshot cleanup..."
          
          PRESERVED=$(aws ssm get-parameter --name "/attendancems/latest-db-snapshot" \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          
          # Only delete manual snapshots (skip automated ones with 'rds:' prefix - AWS manages those)
          aws rds describe-db-snapshots \
            --query "DBSnapshots[?contains(DBSnapshotIdentifier, 'attendancems') && SnapshotType=='manual'].DBSnapshotIdentifier" \
            --output text 2>/dev/null | tr '\t' '\n' | while read snap; do
              if [ -n "$snap" ] && [ "$snap" != "$PRESERVED" ]; then
                echo "  Deleting old snapshot: $snap"
                aws rds delete-db-snapshot --db-snapshot-identifier "$snap" 2>/dev/null || true
              else
                echo "  Keeping snapshot: $snap"
              fi
          done
          echo "✅ Snapshots cleaned (preserved: $PRESERVED)"

      - name: Clean up Terraform state for fresh rebuild
        if: success()
        run: |
          # Delete the state file so next apply starts fresh
          aws s3 rm s3://attendancems-terraform-state/prod/terraform.tfstate || true
          # Clean up old state versions to reduce S3 storage costs
          aws s3api list-object-versions --bucket attendancems-terraform-state --prefix prod/ \
            --query 'Versions[?IsLatest==`false`].[Key,VersionId]' --output text 2>/dev/null | \
            while read key version; do
              if [ -n "$key" ] && [ -n "$version" ]; then
                aws s3api delete-object --bucket attendancems-terraform-state --key "$key" --version-id "$version" 2>/dev/null || true
              fi
            done
          # Clean up delete markers
          aws s3api list-object-versions --bucket attendancems-terraform-state --prefix prod/ \
            --query 'DeleteMarkers[*].[Key,VersionId]' --output text 2>/dev/null | \
            while read key version; do
              if [ -n "$key" ] && [ -n "$version" ]; then
                aws s3api delete-object --bucket attendancems-terraform-state --key "$key" --version-id "$version" 2>/dev/null || true
              fi
            done
          # Clean up any stale DynamoDB entries
          aws dynamodb delete-item --table-name attendancems-terraform-locks \
            --key '{"LockID":{"S":"attendancems-terraform-state/prod/terraform.tfstate"}}' || true
          aws dynamodb delete-item --table-name attendancems-terraform-locks \
            --key '{"LockID":{"S":"attendancems-terraform-state/prod/terraform.tfstate-md5"}}' || true
          echo "✅ Terraform state cleaned up for fresh rebuild"

      - name: Destruction summary
        if: always()
        run: |
          echo "## 🗑️ Infrastructure Destruction" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ env.AWS_REGION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DB Snapshot | ${{ steps.snapshot.outputs.snapshot_id || 'none' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ All AWS infrastructure has been destroyed." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Destruction may have partially failed. Check logs above." >> $GITHUB_STEP_SUMMARY
          fi
